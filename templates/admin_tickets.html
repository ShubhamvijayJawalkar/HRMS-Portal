<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>HRMS - Tickets</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root {
            --primary: #0F172A; --primary-light: #1E293B; --secondary: #334155;
            --accent: #0369A1; --accent-light: #E0F2FE; --background: #F1F5F9;
            --surface: #FFFFFF; --text: #020617; --text-muted: #64748B;
            --muted: #E8ECF1; --border: #E2E8F0; --destructive: #DC2626;
            --success: #22C55E; --warning: #EAB308; --card-radius: 16px;
            --button-radius: 10px; --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
            --shadow: 0 2px 12px rgba(0,0,0,0.06); --shadow-lg: 0 4px 24px rgba(0,0,0,0.1);
        }
        * { font-family: 'Plus Jakarta Sans', system-ui, sans-serif; }
        body { background: var(--background); }
        .navbar { background: var(--primary) !important; box-shadow: 0 2px 16px rgba(15,23,42,0.2); }
        .navbar-brand { font-weight: 800; color: white !important; letter-spacing: -0.3px; }
        .navbar-nav .nav-link { color: #94A3B8 !important; font-weight: 500; font-size: 13px; padding: 16px 14px !important; }
        .navbar-nav .nav-link:hover { color: white !important; background: rgba(255,255,255,0.06); }
        .navbar-nav .nav-link i { margin-right: 6px; }
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--card-radius); box-shadow: var(--shadow-sm); margin-bottom: 20px; }
        .card-header { background: var(--primary); color: white; border-radius: var(--card-radius) var(--card-radius) 0 0 !important; padding: 16px 20px; font-weight: 700; border: none; }
        .card-header i { margin-right: 8px; color: #60A5FA; }
        .card-body { padding: 24px; }
        .page-title { font-size: 22px; font-weight: 800; color: var(--text); letter-spacing: -0.3px; margin-bottom: 20px; }
        .page-header { display: flex; justify-content: space-between; align-items: center; background: linear-gradient(135deg, var(--primary) 0%, #2563EB 100%); color: white; border-radius: 20px; padding: 20px 24px; margin-bottom: 20px; box-shadow: var(--shadow); }
        .page-header .eyebrow { font-size: 11px; text-transform: uppercase; letter-spacing: 0.18em; color: #BFDBFE; font-weight: 700; margin-bottom: 6px; }
        .page-header .page-title { color: white; margin-bottom: 0; font-size: 24px; }
        .page-header-badge { background: rgba(255,255,255,0.16); border: 1px solid rgba(255,255,255,0.2); padding: 8px 12px; border-radius: 999px; font-size: 12px; font-weight: 600; }
        .form-label { font-weight: 600; color: var(--text); font-size: 13px; margin-bottom: 6px; }
        .form-control, .form-select { border: 1.5px solid var(--border); border-radius: 10px; padding: 10px 14px; font-size: 14px; background: var(--background); }
        .form-control:focus, .form-select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(3,105,161,0.12); background: var(--surface); }
        .btn-primary { background: var(--primary); border: none; border-radius: var(--button-radius); font-weight: 700; padding: 10px 20px; font-size: 14px; }
        .btn-primary:hover { background: #1E293B; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(15,23,42,0.2); }
        .btn-success { background: var(--success); border: none; border-radius: var(--button-radius); font-weight: 600; }
        .btn-danger { background: var(--destructive); border: none; border-radius: var(--button-radius); font-weight: 600; }
        .btn-warning { background: var(--warning); border: none; border-radius: var(--button-radius); font-weight: 600; color: #1E293B; }
        .table th { color: var(--text); font-weight: 600; border: none; padding: 12px 14px; background: #F8FAFC; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
        .table td { vertical-align: middle; border-color: var(--border); padding: 10px 14px; font-size: 13px; }
        .table tbody tr:hover { background: #FAFBFC; }
        .logout-btn { color: #94A3B8; font-weight: 600; text-decoration: none; padding: 8px 16px; border-radius: 8px; }
        .logout-btn:hover { color: white; background: rgba(255,255,255,0.1); }
        .user-info { display: flex; align-items: center; gap: 12px; color: #CBD5E1; }
        .status-badge { padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 600; display: inline-block; }
        .status-Pending { background: #FEFCE8; color: #92400E; }
        .status-Approved { background: #F0FDF4; color: #166534; }
        .status-Rejected { background: #FEF2F2; color: #991B1B; }
        .btn-sm { border-radius: 8px; font-weight: 600; padding: 5px 14px; font-size: 12px; }
        .alert { border-radius: 10px; border: none; }
        .admin-badge { background: rgba(255,255,255,0.2); padding: 5px 12px; border-radius: 20px; font-size: 12px; color: white; font-weight: 600; }
        .status-Open { background: #cff4fc; color: #055160; padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .status-In Progress { background: #fff3cd; color: #856404; padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .status-Resolved { background: #d4edda; color: #155724; padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .status-Closed { background: #e2e3e5; color: #41464b; padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .priority-High { color: #dc3545; font-weight: 600; }
        .priority-Medium { color: #ffc107; font-weight: 600; }
        .priority-Low { color: #198754; font-weight: 600; }
    </style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
</head>
<body>
{% include "_navbar.html" %}

<div class="container-fluid p-4">
    <div class="page-header">
        <div>
            <div class="eyebrow">Admin workspace</div>
            <h2 class="page-title">Help Desk Tickets</h2>
        </div>
        <div class="page-header-badge">Queue management</div>
    </div>
    <div class="card">
        <div class="card-header"><h5 class="mb-0">All Tickets</h5></div>
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead><tr><th>#</th><th>Employee</th><th>Subject</th><th>Category</th><th>Priority</th><th>Status</th><th>Assigned To</th><th>Created</th><th>Actions</th></tr></thead>
                    <tbody id="ticketsTable"><tr><td colspan="9" class="text-center text-muted">Loading...</td></tr></tbody>
                </table>
            </div>
        </div>
    </div>
    <div class="card" id="detailCard" style="display:none">
        <div class="card-header"><h5 class="mb-0">Ticket Detail</h5></div>
        <div class="card-body">
            <div id="ticketDetail"></div>
            <hr>
            <div class="row g-3">
                <div class="col-md-8"><label class="form-label">Add Comment</label><input id="commentText" class="form-control"></div>
                <div class="col-md-2"><label class="form-label">&nbsp;</label><button class="btn btn-primary w-100" onclick="addComment()">Comment</button></div>
                <div class="col-md-2"><label class="form-label">Status</label>
                    <select id="statusSelect" class="form-select" onchange="changeStatus()">
                        <option value="Open">Open</option>
                        <option value="In Progress">In Progress</option>
                        <option value="Resolved">Resolved</option>
                        <option value="Closed">Closed</option>
                    </select>
                </div>
            </div>
            <div id="commentsSection" class="mt-3"></div>
        </div>
    </div>
</div>
<script>
let currentTicketId = null;
document.addEventListener('DOMContentLoaded', loadTickets);
async function loadTickets() {
    const r = await fetch('/api/tickets');
    const data = await r.json();
    const tbody = document.getElementById('ticketsTable');
    if (!data.length) { tbody.innerHTML = '<tr><td colspan="9" class="text-center text-muted">No tickets</td></tr>'; return; }
    tbody.innerHTML = data.map(t => `<tr>
        <td>${t.id}</td><td><strong>${t.employee}</strong></td>
        <td><a href="javascript:void(0)" onclick="showTicket(${t.id})" style="color:#1e293b;font-weight:600">${t.subject}</a></td>
        <td>${t.category || '-'}</td>
        <td class="priority-${t.priority}">${t.priority}</td>
        <td><span class="status-${t.status.replace(' ','%20')}">${t.status}</span></td>
        <td>${t.assigned_to || 'Unassigned'}</td>
        <td>${new Date(t.created_at).toLocaleDateString()}</td>
        <td><button class="btn btn-sm btn-outline-secondary" onclick="showTicket(${t.id})">View</button></td>
    </tr>`).join('');
}
async function showTicket(id) {
    currentTicketId = id;
    const r = await fetch(`/api/tickets/${id}`);
    const t = await r.json();
    document.getElementById('detailCard').style.display = 'block';
    document.getElementById('ticketDetail').innerHTML = `
        <h5>${t.subject}</h5>
        <p><strong>By:</strong> ${t.employee} | <strong>Category:</strong> ${t.category || '-'} | <strong>Priority:</strong> <span class="priority-${t.priority}">${t.priority}</span> | <strong>Status:</strong> ${t.status}</p>
        <p>${t.description || 'No description'}</p>
    `;
    document.getElementById('statusSelect').value = t.status;
    const cs = document.getElementById('commentsSection');
    if (t.comments && t.comments.length) {
        cs.innerHTML = '<hr><h6>Comments</h6>' + t.comments.map(c => `<div class="mb-2 p-2" style="background:#f5f7fb;border-radius:8px"><strong>${c.name}</strong> <small class="text-muted">${new Date(c.created_at).toLocaleString()}</small><br>${c.comment}</div>`).join('');
    } else {
        cs.innerHTML = '';
    }
}
async function addComment() {
    const text = document.getElementById('commentText').value;
    if (!text || !currentTicketId) return;
    const r = await fetch(`/api/tickets/${currentTicketId}/comment`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({comment:text}) });
    if (r.ok) { document.getElementById('commentText').value = ''; showTicket(currentTicketId); } else alert('Failed');
}
async function changeStatus() {
    const status = document.getElementById('statusSelect').value;
    if (!currentTicketId) return;
    const r = await fetch(`/api/tickets/${currentTicketId}/status`, { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({status}) });
    if (r.ok) { showTicket(currentTicketId); loadTickets(); } else alert('Failed');
}
</script>
</body>
</html>
