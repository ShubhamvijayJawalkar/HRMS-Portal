<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>HRMS - My Leaves</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root {
            --primary: #0F172A; --primary-light: #1E293B; --secondary: #334155;
            --accent: #0369A1; --accent-light: #E0F2FE; --background: #F1F5F9;
            --surface: #FFFFFF; --text: #020617; --text-muted: #64748B;
            --muted: #E8ECF1; --border: #E2E8F0; --destructive: #DC2626;
            --success: #22C55E; --success-light: #F0FDF4; --warning: #EAB308;
            --warning-light: #FEFCE8; --info: #0369A1; --card-radius: 14px;
            --button-radius: 8px; --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
            --shadow: 0 2px 12px rgba(0,0,0,0.06); --shadow-lg: 0 8px 30px rgba(0,0,0,0.12);
            --transition-fast: 150ms ease; --transition-base: 250ms ease;
        }
        *, *::before, *::after { box-sizing: border-box; }
        a:focus-visible, button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 4px; }
        @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; } }
        * { font-family: 'Plus Jakarta Sans', system-ui, sans-serif; }
        body { background: var(--background); }
        .navbar { background: var(--primary) !important; box-shadow: 0 2px 16px rgba(15,23,42,0.2); }
        .navbar-brand { font-weight: 800; color: white !important; letter-spacing: -0.3px; }
        .navbar-nav .nav-link { color: #94A3B8 !important; font-weight: 500; font-size: 13px; padding: 16px 14px !important; }
        .navbar-nav .nav-link:hover { color: white !important; background: rgba(255,255,255,0.06); }
        .navbar-nav .nav-link i { margin-right: 6px; }
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--card-radius); box-shadow: var(--shadow-sm); margin-bottom: 20px; }
        .card-header { background: var(--primary); color: white; border-radius: var(--card-radius) var(--card-radius) 0 0 !important; padding: 12px 16px; font-weight: 700; font-size: 13px; border: none; }
        .card-header i { margin-right: 8px; color: #60A5FA; }
        .card-body { padding: 16px; }
        .page-title { font-size: 22px; font-weight: 800; color: var(--text); letter-spacing: -0.3px; margin-bottom: 20px; }
        .form-label { font-weight: 600; color: var(--text); font-size: 13px; margin-bottom: 6px; }
        .form-control, .form-select { border: 1.5px solid var(--border); border-radius: 10px; padding: 10px 14px; font-size: 14px; background: var(--background); }
        .form-control:focus, .form-select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(3,105,161,0.12); background: var(--surface); }
        .btn-primary { background: var(--primary); border: none; border-radius: var(--button-radius); font-weight: 700; padding: 10px 20px; font-size: 14px; }
        .btn-primary:hover { background: #1E293B; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(15,23,42,0.2); }
        .btn-success { background: var(--success); border: none; border-radius: var(--button-radius); font-weight: 600; }
        .btn-danger { background: var(--destructive); border: none; border-radius: var(--button-radius); font-weight: 600; }
        .btn-warning { background: var(--warning); border: none; border-radius: var(--button-radius); font-weight: 600; color: #1E293B; }
        .table th { color: var(--text); font-weight: 600; border: none; padding: 12px 14px; background: #F8FAFC; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
        .table td { vertical-align: middle; border-color: var(--border); padding: 10px 14px; font-size: 13px; }
        .table tbody tr:hover { background: #FAFBFC; }
        .logout-btn { color: #94A3B8; font-weight: 600; text-decoration: none; padding: 8px 16px; border-radius: 8px; }
        .logout-btn:hover { color: white; background: rgba(255,255,255,0.1); }
        .user-info { display: flex; align-items: center; gap: 12px; color: #CBD5E1; }
        .status-badge { padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 600; display: inline-block; }
        .status-Pending { background: #FEFCE8; color: #92400E; }
        .status-Approved { background: #F0FDF4; color: #166534; }
        .status-Rejected { background: #FEF2F2; color: #991B1B; }
        .btn-sm { border-radius: 8px; font-weight: 600; padding: 5px 14px; font-size: 12px; }
        .alert { border-radius: 10px; border: none; }
        .balance-card { text-align: center; padding: 20px; }
        .balance-value { font-size: 32px; font-weight: bold; color: #22C55E; }
        .balance-label { color: #64748B; margin-top: 10px; font-size: 14px; }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
</head>
<body>
{% include "_navbar.html" %}

<div class="container-fluid p-4">
    <h2 class="page-title">Leave Management</h2>
    <div id="leaveBalance" class="row mb-4"></div>
    <div class="row">
        <div class="col-lg-5">
            <div class="card">
                <div class="card-header"><h5 class="mb-0">Apply for Leave</h5></div>
                <div class="card-body">
                    <form id="leaveForm">
                        <div class="mb-3">
                            <label class="form-label">Leave Type</label>
                            <select id="leaveType" class="form-select" required>
                                <option value="">Select</option>
                                <option value="Casual">Casual Leave</option>
                                <option value="Sick">Sick Leave</option>
                                <option value="Annual">Annual Leave</option>
                            </select>
                        </div>
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label">Start Date</label>
                                <input type="date" id="startDate" class="form-control" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">End Date</label>
                                <input type="date" id="endDate" class="form-control" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Reason</label>
                            <textarea id="reason" class="form-control" rows="3" placeholder="Optional reason"></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary">Submit Leave Request</button>
                    </form>
                    <div id="leaveMsg" style="margin-top: 15px; display: none;"></div>
                </div>
            </div>
        </div>
        <div class="col-lg-7">
            <div class="card">
                <div class="card-header"><h5 class="mb-0">My Leave History</h5></div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-hover">
                            <thead><tr><th>Type</th><th>From</th><th>To</th><th>Days</th><th>Status</th><th>Reason</th></tr></thead>
                            <tbody id="leaveHistory"><tr><td colspan="6" class="text-center text-muted">No leave records</td></tr></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script>
document.addEventListener('DOMContentLoaded', () => {
    loadLeaveBalance();
    loadLeaveHistory();
    document.getElementById('leaveForm').addEventListener('submit', applyLeave);
});
async function loadLeaveBalance() {
    const r = await fetch('/api/leave-balance');
    const data = await r.json();
    const container = document.getElementById('leaveBalance');
    container.innerHTML = data.map(b => `
        <div class="col-md-4">
            <div class="card"><div class="card-body balance-card">
                <div class="balance-value">${b.remaining}</div>
                <div class="balance-label">${b.leave_type} Leave Remaining<br><small>${b.total_days} total, ${b.used_days} used</small></div>
            </div></div>
        </div>
    `).join('');
}
async function loadLeaveHistory() {
    const r = await fetch('/api/leaves');
    const data = await r.json();
    const tbody = document.getElementById('leaveHistory');
    if (!data.length) { tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted">No leave records</td></tr>'; return; }
    tbody.innerHTML = data.map(l => {
        const sd = new Date(l.start_date), ed = new Date(l.end_date);
        const days = Math.ceil((ed - sd) / (1000*60*60*24)) + 1;
        return `<tr>
            <td><strong>${l.leave_type}</strong></td>
            <td>${l.start_date}</td>
            <td>${l.end_date}</td>
            <td>${days}</td>
            <td><span class="status-badge status-${l.status}">${l.status}</span></td>
            <td>${l.reason || '-'}</td>
        </tr>`;
    }).join('');
}
async function applyLeave(e) {
    e.preventDefault();
    const body = { leave_type: document.getElementById('leaveType').value, start_date: document.getElementById('startDate').value, end_date: document.getElementById('endDate').value, reason: document.getElementById('reason').value };
    const r = await fetch('/api/leaves', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    const d = await r.json();
    const msg = document.getElementById('leaveMsg');
    msg.style.display = 'block';
    msg.className = r.ok ? 'text-success' : 'text-danger';
    msg.textContent = d.message || d.error;
    if (r.ok) { document.getElementById('leaveForm').reset(); loadLeaveBalance(); loadLeaveHistory(); }
}
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
