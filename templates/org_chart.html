<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>HRMS - Org Chart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root {
            --primary: #0F172A; --primary-light: #1E293B; --secondary: #334155;
            --accent: #0369A1; --accent-light: #E0F2FE; --background: #F1F5F9;
            --surface: #FFFFFF; --text: #020617; --text-muted: #64748B;
            --muted: #E8ECF1; --border: #E2E8F0; --destructive: #DC2626;
            --success: #22C55E; --warning: #EAB308; --card-radius: 16px;
            --button-radius: 10px; --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
            --shadow: 0 2px 12px rgba(0,0,0,0.06); --shadow-lg: 0 4px 24px rgba(0,0,0,0.1);
        }
        * { font-family: 'Plus Jakarta Sans', system-ui, sans-serif; }
        body { background: var(--background); }
        .navbar { background: var(--primary) !important; box-shadow: 0 2px 16px rgba(15,23,42,0.2); }
        .navbar-brand { font-weight: 800; color: white !important; letter-spacing: -0.3px; }
        .navbar-nav .nav-link { color: #94A3B8 !important; font-weight: 500; font-size: 13px; padding: 16px 14px !important; }
        .navbar-nav .nav-link:hover { color: white !important; background: rgba(255,255,255,0.06); }
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--card-radius); box-shadow: var(--shadow-sm); margin-bottom: 20px; }
        .card-header { background: var(--primary); color: white; border-radius: var(--card-radius) var(--card-radius) 0 0 !important; padding: 16px 20px; font-weight: 700; border: none; }
        .card-header i { margin-right: 8px; color: #60A5FA; }
        .card-body { padding: 24px; }
        .page-title { font-size: 22px; font-weight: 800; color: var(--text); letter-spacing: -0.3px; margin-bottom: 20px; }
        .form-label { font-weight: 600; color: var(--text); font-size: 13px; margin-bottom: 6px; }
        .form-control, .form-select { border: 1.5px solid var(--border); border-radius: 10px; padding: 10px 14px; font-size: 14px; background: var(--background); }
        .form-control:focus, .form-select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(3,105,161,0.12); background: var(--surface); }
        .btn-primary { background: var(--primary); border: none; border-radius: var(--button-radius); font-weight: 700; padding: 10px 20px; font-size: 14px; }
        .btn-primary:hover { background: #1E293B; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(15,23,42,0.2); }
        .btn-success { background: var(--success); border: none; border-radius: var(--button-radius); font-weight: 600; }
        .btn-danger { background: var(--destructive); border: none; border-radius: var(--button-radius); font-weight: 600; }
        .btn-warning { background: var(--warning); border: none; border-radius: var(--button-radius); font-weight: 600; color: #1E293B; }
        .table th { color: var(--text); font-weight: 600; border: none; padding: 12px 14px; background: #F8FAFC; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
        .table td { vertical-align: middle; border-color: var(--border); padding: 10px 14px; font-size: 13px; }
        .table tbody tr:hover { background: #FAFBFC; }
        .logout-btn { color: #94A3B8; font-weight: 600; text-decoration: none; padding: 8px 16px; border-radius: 8px; }
        .logout-btn:hover { color: white; background: rgba(255,255,255,0.1); }
        .user-info { display: flex; align-items: center; gap: 12px; color: #CBD5E1; }
        .btn-sm { border-radius: 8px; font-weight: 600; padding: 5px 14px; font-size: 12px; }
        .alert { border-radius: 10px; border: none; }
        .admin-badge { background: rgba(255,255,255,0.2); padding: 5px 12px; border-radius: 20px; font-size: 12px; color: white; font-weight: 600; }
        .org-node {
            display: inline-block; min-width: 190px; max-width: 220px; padding: 14px 16px;
            border-radius: 16px; margin: 8px; text-align: center; color: white;
            background: linear-gradient(135deg, var(--primary) 0%, #1d4ed8 100%);
            box-shadow: 0 10px 24px rgba(15, 23, 42, 0.16); border: 1px solid rgba(255,255,255,0.16);
        }
        .org-node .title { font-size: 11px; color: #e2e8f0; margin-top: 5px; line-height: 1.4; }
        .org-node .dept { font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; color: #bfdbfe; margin-top: 3px; }
        .org-node.sub { background: linear-gradient(135deg, var(--accent) 0%, #0f766e 100%); }
        .org-level { display: flex; justify-content: center; flex-wrap: wrap; gap: 14px; margin: 18px 0 10px; padding: 12px 8px; }
        .org-branch { display: flex; flex-direction: column; align-items: center; position: relative; }
        .connector { width: 2px; height: 24px; background: linear-gradient(180deg, #94a3b8, #cbd5e1); margin: 0 auto 4px; }
        .org-empty { color: var(--text-muted); font-style: italic; padding: 24px 0; }
        .org-summary { display: inline-flex; align-items: center; gap: 8px; padding: 8px 12px; background: #eff6ff; color: #1d4ed8; border-radius: 999px; font-size: 12px; font-weight: 700; margin-bottom: 12px; }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
</head>
<body>
{% include "_navbar.html" %}

<div class="container-fluid p-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="page-title">Organization Chart</h2>
    </div>
    <div class="card">
        <div class="card-header"><h5 class="mb-0">Hierarchy</h5></div>
        <div class="card-body">
            <div class="org-summary"><i class="bi bi-diagram-3-fill"></i> Live reporting structure for active employees</div>
            <div id="orgChartContainer" class="text-center py-4">
                <div class="spinner-border text-secondary" role="status"></div>
            </div>
        </div>
    </div>
</div>
<script>
document.addEventListener('DOMContentLoaded', loadOrgChart);
async function loadOrgChart() {
    const r = await fetch('/api/org-chart');
    const emps = await r.json();
    const container = document.getElementById('orgChartContainer');
    if (!emps.length) {
        container.innerHTML = '<div class="org-empty">No active employees available for the organization chart.</div>';
        return;
    }
    const managers = {};
    emps.forEach(e => {
        const mid = e.manager_id || 'ROOT';
        if (!managers[mid]) managers[mid] = [];
        managers[mid].push(e);
    });
    const roots = managers['ROOT'] || [];
    if (!roots.length) {
        const fallback = emps[0];
        managers['ROOT'] = [fallback];
    }
    container.innerHTML = buildTree('ROOT', managers, emps);
}
function buildTree(mid, managers, allEmps) {
    const children = managers[mid] || [];
    if (!children.length) return '';
    const isRoot = mid === 'ROOT';
    let html = '<div class="org-level">';
    children.forEach(c => {
        const childHtml = [];
        childHtml.push(`<div class="org-branch">`);
        childHtml.push(`<div class="org-node ${isRoot ? '' : 'sub'}"><strong>${esc(c.name)}</strong><div class="title">${esc(c.designation || 'Employee')}</div><div class="dept">${esc(c.department || 'Department')}</div></div>`);
        if (c.id && managers[c.id] && managers[c.id].length) {
            childHtml.push('<div class="connector"></div>');
            childHtml.push(buildTree(c.id, managers, allEmps));
        }
        childHtml.push('</div>');
        html += childHtml.join('');
    });
    html += '</div>';
    return html;
}
function esc(t) { const m={'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}; return (t||'').replace(/[&<>"']/g,c=>m[c]); }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
