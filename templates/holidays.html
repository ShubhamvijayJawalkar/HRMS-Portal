<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>HRMS - Holiday Calendar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root {
            --primary: #0F172A; --primary-light: #1E293B; --secondary: #334155;
            --accent: #0369A1; --accent-light: #E0F2FE; --background: #F1F5F9;
            --surface: #FFFFFF; --text: #020617; --text-muted: #64748B;
            --muted: #E8ECF1; --border: #E2E8F0; --destructive: #DC2626;
            --success: #22C55E; --warning: #EAB308; --card-radius: 16px;
            --button-radius: 10px; --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
            --shadow: 0 2px 12px rgba(0,0,0,0.06); --shadow-lg: 0 4px 24px rgba(0,0,0,0.1);
        }
        * { font-family: 'Plus Jakarta Sans', system-ui, sans-serif; }
        body { background: var(--background); }
        .navbar { background: var(--primary) !important; box-shadow: 0 2px 16px rgba(15,23,42,0.2); }
        .navbar-brand { font-weight: 800; color: white !important; letter-spacing: -0.3px; }
        .navbar-nav .nav-link { color: #94A3B8 !important; font-weight: 500; font-size: 13px; padding: 16px 14px !important; }
        .navbar-nav .nav-link:hover { color: white !important; background: rgba(255,255,255,0.06); }
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--card-radius); box-shadow: var(--shadow-sm); margin-bottom: 20px; }
        .card-header { background: var(--primary); color: white; border-radius: var(--card-radius) var(--card-radius) 0 0 !important; padding: 16px 20px; font-weight: 700; border: none; }
        .card-header i { margin-right: 8px; color: #60A5FA; }
        .card-body { padding: 24px; }
        .page-title { font-size: 22px; font-weight: 800; color: var(--text); letter-spacing: -0.3px; margin-bottom: 20px; }
        .form-label { font-weight: 600; color: var(--text); font-size: 13px; margin-bottom: 6px; }
        .form-control, .form-select { border: 1.5px solid var(--border); border-radius: 10px; padding: 10px 14px; font-size: 14px; background: var(--background); }
        .form-control:focus, .form-select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(3,105,161,0.12); background: var(--surface); }
        .btn-primary { background: var(--primary); border: none; border-radius: var(--button-radius); font-weight: 700; padding: 10px 20px; font-size: 14px; }
        .btn-primary:hover { background: #1E293B; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(15,23,42,0.2); }
        .btn-success { background: var(--success); border: none; border-radius: var(--button-radius); font-weight: 600; }
        .btn-danger { background: var(--destructive); border: none; border-radius: var(--button-radius); font-weight: 600; }
        .btn-warning { background: var(--warning); border: none; border-radius: var(--button-radius); font-weight: 600; color: #1E293B; }
        .table th { color: var(--text); font-weight: 600; border: none; padding: 12px 14px; background: #F8FAFC; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
        .table td { vertical-align: middle; border-color: var(--border); padding: 10px 14px; font-size: 13px; }
        .table tbody tr:hover { background: #FAFBFC; }
        .logout-btn { color: #94A3B8; font-weight: 600; text-decoration: none; padding: 8px 16px; border-radius: 8px; }
        .logout-btn:hover { color: white; background: rgba(255,255,255,0.1); }
        .user-info { display: flex; align-items: center; gap: 12px; color: #CBD5E1; }
        .btn-sm { border-radius: 8px; font-weight: 600; padding: 5px 14px; font-size: 12px; }
        .alert { border-radius: 10px; border: none; }
        .admin-badge { background: rgba(255,255,255,0.2); padding: 5px 12px; border-radius: 20px; font-size: 12px; color: white; font-weight: 600; }
        .holiday-national { background: #d4edda; padding: 4px 10px; border-radius: 4px; font-size: 12px; font-weight: 600; color: #155724; }
        .holiday-optional { background: #fff3cd; padding: 4px 10px; border-radius: 4px; font-size: 12px; font-weight: 600; color: #856404; }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
</head>
<body>
{% include "_navbar.html" %}

<div class="container-fluid p-4">
    <h2 class="page-title mb-4">Holiday Calendar</h2>
    <div class="row">
        <div class="col-lg-4">
            <div class="card">
                <div class="card-header"><h5 class="mb-0">Add Holiday</h5></div>
                <div class="card-body">
                    <form id="holidayForm">
                        <div class="mb-3"><label class="form-label">Holiday Name</label><input type="text" id="holidayName" class="form-control" required></div>
                        <div class="mb-3"><label class="form-label">Date</label><input type="date" id="holidayDate" class="form-control" required></div>
                        <div class="mb-3"><label class="form-label">Type</label><select id="holidayType" class="form-select"><option>National</option><option>Optional</option></select></div>
                        <button type="submit" class="btn btn-primary">Add Holiday</button>
                    </form>
                    <div id="holidayMsg" style="margin-top:15px;display:none;"></div>
                </div>
            </div>
        </div>
        <div class="col-lg-8">
            <div class="card">
                <div class="card-header"><h5 class="mb-0">Holidays</h5></div>
                <div class="card-body">
                    <div class="mb-3"><label class="form-label">Year</label><select id="yearSelect" class="form-select w-auto" onchange="loadHolidays()"></select></div>
                    <div class="table-responsive">
                        <table class="table table-hover">
                            <thead><tr><th>Name</th><th>Date</th><th>Type</th><th>Actions</th></tr></thead>
                            <tbody id="holidaysTable"><tr><td colspan="4" class="text-center text-muted">Loading...</td></tr></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script>
document.addEventListener('DOMContentLoaded', () => {
    const y = new Date().getFullYear();
    const sel = document.getElementById('yearSelect');
    for (let i = y - 1; i <= y + 2; i++) { const o = document.createElement('option'); o.value = i; o.text = i; if (i === y) o.selected = true; sel.appendChild(o); }
    loadHolidays();
    document.getElementById('holidayForm').addEventListener('submit', addHoliday);
});
async function loadHolidays() {
    const year = document.getElementById('yearSelect').value;
    const r = await fetch(`/api/holidays?year=${year}`);
    const data = await r.json();
    const tbody = document.getElementById('holidaysTable');
    if (!data.length) { tbody.innerHTML = '<tr><td colspan="4" class="text-center text-muted">No holidays</td></tr>'; return; }
    tbody.innerHTML = data.map(h => `
        <tr>
            <td><strong>${esc(h.name)}</strong></td>
            <td>${h.date}</td>
            <td><span class="${h.type === 'National' ? 'holiday-national' : 'holiday-optional'}">${h.type}</span></td>
            <td><button class="btn btn-danger btn-sm" onclick="deleteHoliday(${h.id})">Delete</button></td>
        </tr>
    `).join('');
}
async function addHoliday(e) {
    e.preventDefault();
    const r = await fetch('/api/holidays', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name: document.getElementById('holidayName').value, date: document.getElementById('holidayDate').value, type: document.getElementById('holidayType').value }) });
    const d = await r.json();
    const msg = document.getElementById('holidayMsg');
    msg.style.display = 'block';
    msg.className = r.ok ? 'text-success' : 'text-danger';
    msg.textContent = d.message || d.error;
    if (r.ok) { document.getElementById('holidayForm').reset(); loadHolidays(); }
}
async function deleteHoliday(id) {
    if (!confirm('Delete this holiday?')) return;
    await fetch(`/api/holidays/${id}`, { method: 'DELETE' });
    loadHolidays();
}
function esc(t) { const m={'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}; return (t||'').replace(/[&<>"']/g,c=>m[c]); }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
