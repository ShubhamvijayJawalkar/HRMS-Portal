<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>HRMS - Candidates</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root {
            --primary: #0F172A; --primary-light: #1E293B; --secondary: #334155;
            --accent: #0369A1; --accent-light: #E0F2FE; --background: #F1F5F9;
            --surface: #FFFFFF; --text: #020617; --text-muted: #64748B;
            --muted: #E8ECF1; --border: #E2E8F0; --destructive: #DC2626;
            --success: #22C55E; --success-light: #F0FDF4; --warning: #EAB308;
            --warning-light: #FEFCE8; --info: #0369A1; --card-radius: 14px;
            --button-radius: 8px; --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
            --shadow: 0 2px 12px rgba(0,0,0,0.06); --shadow-lg: 0 8px 30px rgba(0,0,0,0.12);
            --transition-fast: 150ms ease; --transition-base: 250ms ease;
        }
        *, *::before, *::after { box-sizing: border-box; }
        a:focus-visible, button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 4px; }
        @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; } }
        * { font-family: 'Plus Jakarta Sans', system-ui, sans-serif; }
        body { background: var(--background); }
        .navbar { background: var(--primary) !important; box-shadow: 0 2px 16px rgba(15,23,42,0.2); }
        .navbar-brand { font-weight: 800; color: white !important; letter-spacing: -0.3px; }
        .navbar-nav .nav-link { color: #94A3B8 !important; font-weight: 500; font-size: 13px; padding: 16px 14px !important; }
        .navbar-nav .nav-link:hover { color: white !important; background: rgba(255,255,255,0.06); }
        .navbar-nav .nav-link i { margin-right: 6px; }
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--card-radius); box-shadow: var(--shadow-sm); margin-bottom: 20px; }
        .card-header { background: var(--primary); color: white; border-radius: var(--card-radius) var(--card-radius) 0 0 !important; padding: 12px 16px; font-weight: 700; font-size: 13px; border: none; }
        .card-header i { margin-right: 8px; color: #60A5FA; }
        .card-body { padding: 16px; }
        .page-title { font-size: 22px; font-weight: 800; color: var(--text); letter-spacing: -0.3px; margin-bottom: 20px; }
        .form-label { font-weight: 600; color: var(--text); font-size: 13px; margin-bottom: 6px; }
        .form-control, .form-select { border: 1.5px solid var(--border); border-radius: 10px; padding: 10px 14px; font-size: 14px; background: var(--background); }
        .form-control:focus, .form-select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(3,105,161,0.12); background: var(--surface); }
        .btn-primary { background: var(--primary); border: none; border-radius: var(--button-radius); font-weight: 700; padding: 10px 20px; font-size: 14px; }
        .btn-primary:hover { background: #1E293B; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(15,23,42,0.2); }
        .btn-success { background: var(--success); border: none; border-radius: var(--button-radius); font-weight: 600; }
        .btn-danger { background: var(--destructive); border: none; border-radius: var(--button-radius); font-weight: 600; }
        .btn-warning { background: var(--warning); border: none; border-radius: var(--button-radius); font-weight: 600; color: #1E293B; }
        .table th { color: var(--text); font-weight: 600; border: none; padding: 12px 14px; background: #F8FAFC; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
        .table td { vertical-align: middle; border-color: var(--border); padding: 10px 14px; font-size: 13px; }
        .table tbody tr:hover { background: #FAFBFC; }
        .logout-btn { color: #94A3B8; font-weight: 600; text-decoration: none; padding: 8px 16px; border-radius: 8px; }
        .logout-btn:hover { color: white; background: rgba(255,255,255,0.1); }
        .user-info { display: flex; align-items: center; gap: 12px; color: #CBD5E1; }
        .status-badge { padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 600; display: inline-block; }
        .status-Pending { background: #FEFCE8; color: #92400E; }
        .status-Approved { background: #F0FDF4; color: #166534; }
        .status-Rejected { background: #FEF2F2; color: #991B1B; }
        .btn-sm { border-radius: 8px; font-weight: 600; padding: 5px 14px; font-size: 12px; }
        .alert { border-radius: 10px; border: none; }
        .admin-badge { background: rgba(255,255,255,0.2); padding: 5px 12px; border-radius: 20px; font-size: 12px; color: white; font-weight: 600; }
        .status-Applied { background: #E0F2FE; color: #0369A1; padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 600; display: inline-block; }
        .status-Screened { background: #FEFCE8; color: #92400E; padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 600; display: inline-block; }
        .status-Interviewed { background: #EDE9FE; color: #5B21B6; padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 600; display: inline-block; }
        .status-Offered { background: #E0F2FE; color: #0369A1; padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 600; display: inline-block; }
        .status-Hired { background: #F0FDF4; color: #166534; padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 600; display: inline-block; }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
</head>
<body>
{% include "_navbar.html" %}

<div class="container-fluid p-4">
    <h2 class="page-title">Candidate Management</h2>
    <div class="card">
        <div class="card-header"><h5 class="mb-0">Add Candidate</h5></div>
        <div class="card-body">
            <div class="row g-3">
                <div class="col-md-3"><label class="form-label">Name</label><input id="cname" class="form-control"></div>
                <div class="col-md-3"><label class="form-label">Email</label><input id="cemail" class="form-control" type="email"></div>
                <div class="col-md-2"><label class="form-label">Phone</label><input id="cphone" class="form-control"></div>
                <div class="col-md-2"><label class="form-label">Job</label><select id="cjob" class="form-select"></select></div>
                <div class="col-md-2"><label class="form-label">&nbsp;</label><button class="btn btn-primary w-100" onclick="addCandidate()">Add</button></div>
            </div>
        </div>
    </div>
    <div class="card">
        <div class="card-header"><h5 class="mb-0">Candidates</h5></div>
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead><tr><th>Name</th><th>Email</th><th>Phone</th><th>Job</th><th>Status</th><th>Applied</th><th>Actions</th></tr></thead>
                    <tbody id="candTable"><tr><td colspan="7" class="text-center text-muted">Loading...</td></tr></tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<script>
document.addEventListener('DOMContentLoaded', async () => {
    const r = await fetch('/api/jobs');
    const jobs = await r.json();
    const sel = document.getElementById('cjob');
    const o = document.createElement('option'); o.value = ''; o.textContent = '-- None --'; sel.appendChild(o);
    jobs.forEach(j => { const opt = document.createElement('option'); opt.value = j.id; opt.textContent = j.title; sel.appendChild(opt); });
    loadCandidates();
});
async function loadCandidates() {
    const r = await fetch('/api/candidates');
    const data = await r.json();
    const tbody = document.getElementById('candTable');
    if (!data.length) { tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted">No candidates</td></tr>'; return; }
    tbody.innerHTML = data.map(c => `<tr>
        <td><strong>${c.name}</strong></td><td>${c.email}</td><td>${c.phone || '-'}</td>
        <td>${c.job_title}</td>
        <td><span class="status-${c.status}">${c.status}</span></td>
        <td>${c.applied_at ? new Date(c.applied_at).toLocaleDateString() : '-'}</td>
        <td>
            <select class="form-select form-select-sm d-inline-block w-auto" onchange="updateStatus(${c.id}, this.value)">
                <option value="Applied" ${c.status==='Applied'?'selected':''}>Applied</option>
                <option value="Screened" ${c.status==='Screened'?'selected':''}>Screened</option>
                <option value="Interviewed" ${c.status==='Interviewed'?'selected':''}>Interviewed</option>
                <option value="Offered" ${c.status==='Offered'?'selected':''}>Offered</option>
                <option value="Hired" ${c.status==='Hired'?'selected':''}>Hired</option>
                <option value="Rejected" ${c.status==='Rejected'?'selected':''}>Rejected</option>
            </select>
        </td>
    </tr>`).join('');
}
async function addCandidate() {
    const body = { name: document.getElementById('cname').value, email: document.getElementById('cemail').value, phone: document.getElementById('cphone').value, job_id: document.getElementById('cjob').value || null };
    if (!body.name || !body.email) return alert('Name and email required');
    const r = await fetch('/api/candidates', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
    const res = await r.json();
    if (r.ok) { loadCandidates(); document.querySelectorAll('#cname,#cemail,#cphone').forEach(e => e.value = ''); } else alert(res.error);
}
async function updateStatus(id, status) {
    const r = await fetch(`/api/candidates/${id}/status`, { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({status}) });
    if (r.ok) loadCandidates(); else alert('Failed');
}
</script>
</body>
</html>
